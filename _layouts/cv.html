<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CV de Marco Chartier - Analyste d'affaire et ERP" />
    <meta name="theme-color" content="#1474a6" />
    <title>{% if page.title %} {{ page.title }} {% else %} CV {% endif %}</title>
    
    <!-- CSS -->
    <link
      href="media/cv-screen.css"
      type="text/css"
      rel="stylesheet"
      media="screen"
    />
    <link
      href="media/cv-print.css"
      type="text/css"
      rel="stylesheet"
      media="print"
    />
    
    <!-- Icons -->
    <link
      href="media/foundation-icons/foundation-icons.css"
      type="text/css"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/774d5c5f58.js"
      crossorigin="anonymous"
      async
    ></script>
    
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="main">
      <div id="content">
        {{ content }}
      </div>
    </div>
  </body>
</html>
